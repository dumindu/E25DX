publishDir: ../docs
baseURL: https://dumindu.github.io/e25dx

themesDir: "../.."
theme: E25DX

enableGitInfo: true
enableRobotsTXT: true

disableKinds: [taxonomy, term]

defaultContentLanguage: en

languages:
  en:
    weight: 1
    languageName: English
    languageCode: en-US
    contentDir: content/en
    title: Site Name
    params:
      description: Site Description

# To omit the Google Analytics script, put a ~ in place of the G-XXXXXXXXXX below.
services:
  googleAnalytics:
    ID: ~

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
    parser:
      attribute:
        block: true
        title: true
  tableOfContents:
    pre: <nav id="TableOfContents" aria-label="Table of Contents">
    post: </nav>

params:
  project:
    # To omit the startYear, put a ~ in its place.
    startYear: 2024
    presentYear: 2026
    repo:
      main: https://github.com/dumindu/e25dx
    themeColor:
      light: '#ffffff'
      dark: '#101010'

  author:
    name: Dumindu Madunuwan
    url: https://github.com/dumindu

  pagination:
    size: 6

  enableOGXSEO: false # No automated OG image generation
  enablePageFind: false # Run pagefind --site dir after build

menus:
  main:
    - identifier: home
      name: Home
      pageRef: /
      weight: 10
      params:
        icon: home
    - identifier: docs
      name: Documentation
      pageRef: /docs
      weight: 20
      params:
        icon: menu_book
